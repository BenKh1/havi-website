<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechina Dashboard</title>
    <style>
        :root {
            --header-color: #c8d9d2;
            --bg-color: #f8f9fa;
            --border-color: #e0e0e0;
            --whatsapp-bg: #e5ddd5;
            --bubble-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            direction: rtl;
        }

        /* --- Header --- */
        header {
            background-color: var(--header-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .header-right { display: flex; align-items: center; gap: 15px; }
        .logo { height: 50px; border-radius: 5px; }
        .title { font-size: 24px; font-weight: bold; color: #444; }
        .search-box { background: white; padding: 5px 10px; border-radius: 5px; display: flex; align-items: center; }

        /* --- Main Layout --- */
        .container {
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            gap: 20px;
            padding: 20px;
        }

        /* --- Sidebar --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .sidebar-link {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            color: #555;
            text-decoration: none;
        }

        /* --- Widgets --- */
        .widgets-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .widget {
            background: #dce7e3;
            border: 1px solid #bdced6;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .widget-small { background: white; border: 1px solid #abc6bd; }
        
        .n36-box {
            background: #c8d9d2;
            grid-row: span 2;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 20px;
            font-size: 40px;
            font-weight: bold;
            border-radius: 8px;
        }

        /* --- WhatsApp Feed --- */
        .feed-section {
            grid-column: span 3;
            margin-top: 30px;
            border-top: 2px solid var(--border-color);
            padding-top: 20px;
        }

        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 70%;
        }

        .avatar {
            width: 35px;
            height: 35px;
            background: #ccc;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .bubble {
            background: var(--bubble-bg);
            padding: 10px 15px;
            border-radius: 15px 15px 0 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            position: relative;
        }

        .sender-name {
            font-size: 0.85em;
            font-weight: bold;
            color: #075e54;
            margin-bottom: 3px;
        }

        .msg-time {
            font-size: 0.7em;
            color: #999;
            text-align: left;
            margin-top: 5px;
        }

    </style>
</head>
<body>

    <header>
        <div class="header-right">
            <img src="logo_havi.jpg" alt="Logo" class="logo">
            <span class="title">ב❤️ מבן</span>
        </div>
        <div class="search-box">🔍</div>
    </header>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-link">חדשות</div>
            <div class="sidebar-link">תמונות</div>

        </div>

        <div class="widgets-grid">
            <div class="widget">ציטוט השבוע</div>
            <div>
                <div class="widget widget-small" style="margin-bottom: 10px;">תמונת השבוע</div>
                <div class="widget widget-small">תמונת הילול חבי</div>
            </div>
        </div>

        <div class="n36-box">
            <span style="font-size: 14px; margin-bottom: 10px;">עדכונים</span>
            N36
        </div>

        <div class="feed-section">
            <div class="chat-container" id="feed">
                <div class="msg">
                    <div class="avatar"></div>
                    <div class="bubble">
                        <div class="sender-name">טעינה...</div>
                        <div>ההודעות מהקבוצה יופיעו כאן בקרוב.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Replace this with your actual Google Web App URL
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxI7aPBR95JeoA_qyhBBkLWFCggd5VpgJDyOgZqEuPAAn_yKU1DhhwLNc6RygG95lo58Q/exec";

        async function loadMessages() {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const data = await response.json();
                const feed = document.getElementById('feed');
                feed.innerHTML = ''; 

                // Process the rows from your Google Sheet
                data.reverse().forEach(row => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'msg';
                    
                    // row[0] = Timestamp, row[1] = Sender, row[2] = Content
                    msgDiv.innerHTML = `
                        <div class="avatar"></div>
                        <div class="bubble">
                            <div class="sender-name">אנונימוס</div>
                            <div class="content">${row[2]}</div>
                            <div class="msg-time">${new Date(row[0]).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'})}</div>
                        </div>
                    `;
                    feed.appendChild(msgDiv);
                });
            } catch (e) {
                console.error("Error loading messages:", e);
            }
        }

        // Load initially and refresh every 30 seconds
        loadMessages();
        setInterval(loadMessages, 30000);
    </script>
</body>
</html>
